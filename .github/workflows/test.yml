name: Run Vitest

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.4

      - name: Setup Node.js
        uses: actions/setup-node@v3.9.1
        with:
          node-version: "24.6.0"
          cache: "npm"

      - name: Install dependencies
        run: npm i

      - name: Run Vitest
        run: npm run test
